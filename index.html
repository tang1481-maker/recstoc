<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人資產交易紀錄器 (雲端版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .text-profit { color: #ef4444; } 
        .text-loss { color: #22c55e; }   
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="text-gray-800">

<!-- 載入中遮罩 -->
<div id="loadingOverlay" class="fixed inset-0 bg-white/90 z-[200] flex items-center justify-center backdrop-blur-sm transition-opacity duration-300">
    <div class="text-center text-blue-600 font-bold flex flex-col items-center gap-3">
        <svg class="animate-spin h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>連線至雲端資料庫中...</span>
    </div>
</div>

<div class="max-w-md mx-auto bg-gray-50 min-h-screen relative pb-20 shadow-xl">
    
    <!-- 頂部固定區 (Sticky Header) -->
    <header class="sticky top-0 z-50 bg-white shadow-sm px-4 py-3 flex justify-between items-center">
        <h1 class="text-lg font-bold text-gray-800 flex items-center gap-2">
            <i data-lucide="cloud" class="w-5 h-5 text-blue-600"></i> 資產紀錄器
        </h1>
        <div class="flex items-center gap-3">
            <select id="headerUserSelect" onchange="changeCurrentUser(this.value)" class="text-sm border-gray-300 rounded-md bg-gray-100 px-2 py-1 outline-none">
                <!-- 動態載入使用者 -->
            </select>
            <button onclick="openExportModal()" class="text-gray-600 p-1 bg-gray-100 rounded-full hover:bg-gray-200">
                <i data-lucide="download" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- 區塊一：總投資面板 (Dashboard) -->
    <div class="p-4">
        <div class="bg-gradient-to-br from-blue-700 to-blue-500 rounded-2xl p-5 text-white shadow-lg relative overflow-hidden">
            <div class="absolute top-0 right-0 opacity-10">
                <i data-lucide="trending-up" class="w-32 h-32 -mr-8 -mt-8"></i>
            </div>
            <p class="text-blue-100 text-sm mb-1">總資產現值 (NT$)</p>
            <h2 class="text-3xl font-bold mb-4" id="dashTotalAsset">0</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-blue-200 text-xs">整體本金報酬率</p>
                    <p class="text-lg font-semibold" id="dashROI">0.00%</p>
                </div>
                <div>
                    <p class="text-blue-200 text-xs">已實現總獲利</p>
                    <p class="text-lg font-semibold" id="dashRealizedProfit">0</p>
                </div>
                <div>
                    <p class="text-blue-200 text-xs">真實投入本金</p>
                    <p class="text-sm font-medium" id="dashRealCapital">0</p>
                </div>
                <div>
                    <p class="text-blue-200 text-xs">資金池餘額</p>
                    <p class="text-sm font-medium" id="dashCashPool">0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 區塊二：資產分類頁籤列 -->
    <div class="px-4 pb-2">
        <div class="flex overflow-x-auto no-scrollbar gap-2 py-1" id="tabContainer">
            <!-- 頁籤按鈕動態產生 -->
        </div>
    </div>

    <!-- 區塊三：動態內容區 -->
    <main id="mainContent" class="px-4 pb-6">
        <!-- 內容由 JS 動態渲染 -->
    </main>

</div>

<!-- 提示訊息 (Toast) -->
<div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-[100] transition-opacity duration-300 opacity-0 pointer-events-none whitespace-nowrap text-sm">
    訊息
</div>

<!-- 新增填寫人 Modal -->
<div id="addUserModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-sm p-6">
        <h3 class="font-bold text-gray-800 mb-4 text-lg">新增填寫人</h3>
        <input type="text" id="modalNewUserName" placeholder="請輸入新的填寫人名稱" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 mb-4">
        <div class="flex justify-end gap-2">
            <button onclick="closeAddUserModal()" class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg">取消</button>
            <button onclick="confirmAddUserModal()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg">確認</button>
        </div>
    </div>
</div>

<!-- 匯出資料 Modal -->
<div id="exportModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-sm p-6">
        <h3 class="font-bold text-gray-800 mb-4 text-lg flex items-center gap-2">
            <i data-lucide="calendar-range" class="w-5 h-5 text-blue-600"></i> 選擇匯出區間
        </h3>
        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-sm text-gray-600 mb-1">起始日期</label>
                <input type="date" id="exportStartDate" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">結束日期</label>
                <input type="date" id="exportEndDate" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
            </div>
        </div>
        <div class="flex justify-end gap-2">
            <button onclick="closeExportModal()" class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg">取消</button>
            <button onclick="confirmExportCSV()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg flex items-center gap-2">
                <i data-lucide="download" class="w-4 h-4"></i> 匯出 CSV
            </button>
        </div>
    </div>
</div>

<!-- 編輯庫存 Modal -->
<div id="editHoldingModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-sm p-6">
        <div class="flex justify-between items-start mb-4">
            <h3 class="font-bold text-gray-800 text-lg flex items-center gap-2">
                <i data-lucide="edit" class="w-5 h-5 text-blue-600"></i> 編輯目前持有
            </h3>
            <button onclick="deleteHoldingAndTxs()" class="text-red-500 hover:text-red-700 p-1 rounded-md hover:bg-red-50 transition-colors" title="刪除此資產及所有明細">
                <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>
        </div>
        <input type="hidden" id="editHoldingId">
        <div class="space-y-3">
            <div class="flex gap-2">
                <div class="w-1/3">
                    <label class="block text-xs text-gray-500 mb-1">代號</label>
                    <input type="text" id="editHoldingCode" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 text-sm">
                </div>
                <div class="w-2/3">
                    <label class="block text-xs text-gray-500 mb-1">名稱</label>
                    <input type="text" id="editHoldingName" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 text-sm">
                </div>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">持有數量</label>
                <input type="number" step="0.0001" id="editHoldingQty" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 text-sm">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">總成本 (NT$)</label>
                <input type="number" step="0.01" id="editHoldingCost" class="w-full border border-gray-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 text-sm">
            </div>
        </div>
        <div class="flex justify-end gap-2 mt-5">
            <button onclick="closeEditHoldingModal()" class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg">取消</button>
            <button onclick="confirmEditHoldingModal()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg flex items-center gap-2">
                <i data-lucide="save" class="w-4 h-4"></i> 儲存修改
            </button>
        </div>
    </div>
</div>

<script type="module">
    // ==========================================
    // Firebase 初始化設定 (使用 ES Module)
    // ==========================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7p0zjKK2FkrAUquvME7z9RDNPIXMB1dY",
        authDomain: "new-mystoc.firebaseapp.com",
        projectId: "new-mystoc",
        storageBucket: "new-mystoc.firebasestorage.app",
        messagingSenderId: "562255915934",
        appId: "1:562255915934:web:b43f6db8554dcb325ac48f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // 定義 Firebase 資料庫路徑 (使用單一文件儲存全家共享狀態)
    const APP_ID = 'mystoc-shared-app'; 
    const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'tracker', 'shared_state');

    // ==========================================
    // 狀態管理 (State) 區分本機與雲端
    // ==========================================
    const CATEGORIES = ['股票', '黃金', '外幣/加密貨幣', '儲蓄/基金', '現金池與流水帳', '系統設定'];
    
    // UI 控制狀態 (不存檔)
    let activeTab = '股票';
    let isFormOpen = false;

    // 1. 本機偏好設定 (Local Storage - 每台手機獨立)
    let currentUser = localStorage.getItem('mystoc_currentUser');
    let collapsedGroups = JSON.parse(localStorage.getItem('mystoc_collapsedGroups') || '{}');

    // 2. 雲端共用資料庫 (Firebase - 全家同步)
    let sharedData = {
        users: [],
        realCapital: 0,
        cashPool: 0,
        realizedProfit: 0,
        holdings: [], 
        transactions: []
    };

    // ==========================================
    // 啟動 Firebase 監聽與身分驗證
    // ==========================================
    async function initFirebase() {
        try {
            await signInAnonymously(auth);
            
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // 開始即時監聽雲端資料變化
                    onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists()) {
                            sharedData = docSnap.data();
                            // 防呆
                            if(!sharedData.users) sharedData.users = ['預設本人'];
                            if(!sharedData.holdings) sharedData.holdings = [];
                            if(!sharedData.transactions) sharedData.transactions = [];
                            
                            // 若本機沒有選過人，預設抓雲端第一個人
                            if (!currentUser && sharedData.users.length > 0) {
                                currentUser = sharedData.users[0];
                                saveLocalData();
                            }
                        } else {
                            // 第一次使用，建立預設雲端資料
                            sharedData.users = ['預設本人'];
                            updateToFirebase();
                            currentUser = '預設本人';
                            saveLocalData();
                        }
                        
                        // 隱藏載入中畫面，重新渲染介面
                        document.getElementById('loadingOverlay').classList.add('hidden');
                        renderAll();
                    }, (error) => {
                        console.error("Firestore error:", error);
                        showToast("雲端資料同步失敗，請檢查網路");
                    });
                }
            });
        } catch (error) {
            console.error("Auth error:", error);
            showToast("系統認證失敗");
        }
    }

    // 將資料寫入 Firebase 雲端
    async function updateToFirebase() {
        try {
            await setDoc(docRef, sharedData);
        } catch (error) {
            console.error("Save error:", error);
            showToast("儲存至雲端失敗！");
        }
    }

    // 將偏好寫入本機 Local Storage
    function saveLocalData() {
        if(currentUser) localStorage.setItem('mystoc_currentUser', currentUser);
        localStorage.setItem('mystoc_collapsedGroups', JSON.stringify(collapsedGroups));
    }

    // 更新並儲存
    function updateAndSave() {
        renderAll();          // 先在本機畫面更新，讓操作感覺流暢
        updateToFirebase();   // 背景發送給 Firebase 同步給其他人
    }


    // ==========================================
    // 核心邏輯與畫面渲染 (Render)
    // ==========================================
    function formatMoney(num) {
        return Number(num).toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function getUnrealizedData() {
        let totalCurrentAssetValue = 0;
        let totalUnrealizedProfit = 0;

        sharedData.holdings.forEach(h => {
            const currentPrice = h.currentPrice || (h.totalCost / h.quantity);
            const marketValue = h.quantity * currentPrice;
            totalCurrentAssetValue += marketValue;
            totalUnrealizedProfit += (marketValue - h.totalCost);
        });

        return { totalCurrentAssetValue, totalUnrealizedProfit };
    }

    function renderAll() {
        lucide.createIcons();
        renderHeader();
        renderDashboard();
        renderTabs();
        renderMainContent();
    }

    function renderHeader() {
        const select = document.getElementById('headerUserSelect');
        let optionsHTML = sharedData.users.map(u => 
            `<option value="${u}" ${u === currentUser ? 'selected' : ''}>${u}</option>`
        ).join('');
        
        optionsHTML += `<option disabled>──────────</option>`;
        optionsHTML += `<option value="ADD_NEW">➕ 新增填寫人...</option>`;
        
        select.innerHTML = optionsHTML;
    }

    // 定義到 window 上，讓 HTML 的 onclick 可以呼叫 module 內的函數
    window.changeCurrentUser = function(name) {
        if (name === 'ADD_NEW') {
            document.getElementById('addUserModal').classList.remove('hidden');
            document.getElementById('modalNewUserName').value = '';
            document.getElementById('modalNewUserName').focus();
        } else {
            currentUser = name;
            saveLocalData();
            renderAll();
        }
    };

    window.closeAddUserModal = function() {
        document.getElementById('addUserModal').classList.add('hidden');
        renderHeader(); 
    };

    window.confirmAddUserModal = function() {
        const newName = document.getElementById('modalNewUserName').value.trim();
        if (newName !== '') {
            if (!sharedData.users.includes(newName)) {
                sharedData.users.push(newName);
            }
            currentUser = newName;
            document.getElementById('addUserModal').classList.add('hidden');
            saveLocalData();
            updateAndSave(); // 新增使用者要同步到雲端
        } else {
            showToast('名稱不能為空');
        }
    };

    window.showToast = function(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.remove('opacity-0');
        setTimeout(() => toast.classList.add('opacity-0'), 3000);
    };

    function renderDashboard() {
        const { totalCurrentAssetValue } = getUnrealizedData();
        const totalAsset = sharedData.cashPool + totalCurrentAssetValue;
        
        let roi = 0;
        if (sharedData.realCapital > 0) {
            roi = ((totalAsset - sharedData.realCapital) / sharedData.realCapital) * 100;
        }

        document.getElementById('dashTotalAsset').textContent = formatMoney(totalAsset);
        
        const roiEl = document.getElementById('dashROI');
        roiEl.textContent = (roi > 0 ? '+' : '') + roi.toFixed(2) + '%';
        roiEl.className = `text-lg font-semibold ${roi >= 0 ? 'text-blue-100' : 'text-red-300'}`;

        document.getElementById('dashRealCapital').textContent = formatMoney(sharedData.realCapital);
        document.getElementById('dashCashPool').textContent = formatMoney(sharedData.cashPool);
        
        const profitEl = document.getElementById('dashRealizedProfit');
        profitEl.textContent = (sharedData.realizedProfit > 0 ? '+' : '') + formatMoney(sharedData.realizedProfit);
    }

    function renderTabs() {
        const container = document.getElementById('tabContainer');
        container.innerHTML = CATEGORIES.map(cat => `
            <button onclick="switchTab('${cat}')" 
                class="whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium transition-colors ${
                    activeTab === cat 
                    ? 'bg-blue-600 text-white shadow-md' 
                    : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'
                }">
                ${cat}
            </button>
        `).join('');
    }

    window.switchTab = function(tab) {
        activeTab = tab;
        isFormOpen = false;
        renderAll();
    };

    function renderMainContent() {
        const main = document.getElementById('mainContent');
        if (activeTab === '系統設定') {
            main.innerHTML = getSettingsHTML();
        } else if (activeTab === '現金池與流水帳') {
            main.innerHTML = getCashPoolHTML();
        } else {
            main.innerHTML = getAssetHTML(activeTab);
        }
        lucide.createIcons();
    }

    function groupTransactionsByMonth(txs) {
        const groups = {};
        txs.forEach(t => {
            const month = t.date.substring(0, 7); 
            if (!groups[month]) groups[month] = [];
            groups[month].push(t);
        });
        return groups;
    }

    function getSettingsHTML() {
        return `
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <i data-lucide="users" class="w-5 h-5"></i> 填寫人名單管理 (雲端同步)
                </h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="newUserName" placeholder="輸入家人名稱" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
                    <button onclick="addUser()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium">新增</button>
                </div>
                <ul class="divide-y divide-gray-100">
                    ${sharedData.users.map((u, idx) => `
                        <li class="py-2 flex justify-between items-center text-sm">
                            <span>${u} ${u === currentUser ? '<span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded ml-2">目前裝置使用中</span>' : ''}</span>
                            ${sharedData.users.length > 1 ? `<button onclick="deleteUser(${idx})" class="text-red-500 hover:text-red-700 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                        </li>
                    `).join('')}
                </ul>
            </div>
            <div class="text-xs text-gray-400 text-center mt-8">
                雲端版提醒：所有新增的交易紀錄與名單皆會自動同步至 Firebase。
            </div>
        `;
    }

    function getCashPoolHTML() {
        return `
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
                <h3 class="font-bold text-gray-700 mb-3">紀錄資金進出</h3>
                <div class="grid grid-cols-3 gap-2 mb-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="cashType" value="deposit" class="peer sr-only" checked>
                        <div class="text-center text-sm py-2 border rounded-lg peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700">存入本金</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="cashType" value="withdraw" class="peer sr-only">
                        <div class="text-center text-sm py-2 border rounded-lg peer-checked:bg-orange-50 peer-checked:border-orange-500 peer-checked:text-orange-700">提領本金</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="cashType" value="dividend" class="peer sr-only">
                        <div class="text-center text-sm py-2 border rounded-lg peer-checked:bg-green-50 peer-checked:border-green-500 peer-checked:text-green-700">領取股息利息</div>
                    </label>
                </div>
                <div class="space-y-3">
                    <input type="date" id="cashDate" value="${new Date().toISOString().split('T')[0]}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                    <input type="number" id="cashAmount" placeholder="金額" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                    <input type="text" id="cashNote" placeholder="來源或備註 (例如: 薪水轉入、台積電配息)" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                    <button onclick="submitCashTx()" class="w-full bg-blue-600 text-white rounded-lg py-2 text-sm font-bold shadow-sm flex items-center justify-center gap-2"><i data-lucide="cloud-upload" class="w-4 h-4"></i> 寫入雲端帳本</button>
                    <p class="text-xs text-gray-400 text-center">將以標籤 [${currentUser}] 紀錄此筆資料</p>
                </div>
            </div>

            <h3 class="font-bold text-gray-700 mb-3 px-1">資金歷史明細</h3>
            <div class="space-y-4">
                ${(() => {
                    const cashTxs = sharedData.transactions.filter(t => ['deposit', 'withdraw', 'dividend'].includes(t.type)).reverse();
                    if (cashTxs.length === 0) return '<p class="text-center text-sm text-gray-400 py-4">暫無明細</p>';
                    
                    const groups = groupTransactionsByMonth(cashTxs);
                    return Object.keys(groups).sort().reverse().map(month => {
                        const groupKey = 'cash_' + month;
                        const isCollapsed = collapsedGroups[groupKey];
                        const monthLabel = month.replace('-', '年') + '月';
                        
                        return `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

                    const groups = groupTransactionsByMonth(txs);

    // --- 各種操作功能綁定至 window ---

    window.toggleForm = function(show) {
        isFormOpen = show;
        renderMainContent();
    };

    window.addUser = function() {
        const input = document.getElementById('newUserName');
        const name = input.value.trim();
        if (name && !sharedData.users.includes(name)) {
            sharedData.users.push(name);
            input.value = '';
            updateAndSave();
        }
    };

    window.deleteUser = function(index) {
        if (sharedData.users.length > 1) {
            const userToDelete = sharedData.users[index];
            sharedData.users.splice(index, 1);
            if (currentUser === userToDelete) {
                currentUser = sharedData.users[0];
                saveLocalData();
            }
            updateAndSave();
        }
    };

    window.updateHoldingPrice = function(id, newPriceStr) {
        const price = parseFloat(newPriceStr);
        const holding = sharedData.holdings.find(h => h.id === id);
        if (holding) {
            holding.currentPrice = isNaN(price) ? 0 : price;
            updateAndSave();
        }
    };

    // --- 編輯目前持有的功能 ---
    window.openEditHoldingModal = function(id) {
        const holding = sharedData.holdings.find(h => h.id === id);
        if (!holding) return;
        
        document.getElementById('editHoldingId').value = id;
        document.getElementById('editHoldingCode').value = holding.code || '';
        document.getElementById('editHoldingName').value = holding.name;
        document.getElementById('editHoldingQty').value = holding.quantity;
        document.getElementById('editHoldingCost').value = holding.totalCost;
        
        document.getElementById('editHoldingModal').classList.remove('hidden');
    };

    window.closeEditHoldingModal = function() {
        document.getElementById('editHoldingModal').classList.add('hidden');
    };

    window.confirmEditHoldingModal = function() {
        const id = document.getElementById('editHoldingId').value;
        const code = document.getElementById('editHoldingCode').value.trim();
        const name = document.getElementById('editHoldingName').value.trim();
        const qty = parseFloat(document.getElementById('editHoldingQty').value);
        const cost = parseFloat(document.getElementById('editHoldingCost').value);

        if (!name || isNaN(qty) || isNaN(cost)) {
            showToast('請確認名稱、數量及總成本格式是否正確');
            return;
        }

        const holding = sharedData.holdings.find(h => h.id === id);
        if (holding) {
            holding.code = code;
            holding.name = name;
            holding.quantity = qty;
            holding.totalCost = cost;
            updateAndSave();
            closeEditHoldingModal();
            showToast('庫存已更新');
        }
    };

    // 刪除整筆資產與所有相關的交易歷史 (連動復原財務數據)
    window.deleteHoldingAndTxs = function() {
        const id = document.getElementById('editHoldingId').value;
        const holding = sharedData.holdings.find(h => h.id === id);
        if (!holding) return;

        if (!confirm(`確定要刪除「${holding.name}」包含下方所有明細嗎？\n相關的資金數據（如現金池、已實現獲利）也將被一併復原。此操作無法復原！`)) {
            return;
        }

        // 找出所有相關的交易紀錄 ID
        const relatedTxIds = sharedData.transactions
            .filter(t => t.category === holding.category && ((holding.code && t.code === holding.code) || (!holding.code && t.name === holding.name)))
            .map(t => t.id);

        // 逐一復原這些交易對整體財務的影響
        relatedTxIds.forEach(txId => {
            const txIndex = sharedData.transactions.findIndex(t => t.id === txId);
            if (txIndex === -1) return;
            const tx = sharedData.transactions[txIndex];

            if (tx.type === 'buy') {
                sharedData.cashPool += tx.amount; // 買入被刪除，退回當初扣除的錢
            } else if (tx.type === 'sell') {
                sharedData.cashPool -= tx.amount; // 賣出被刪除，扣回當初入帳的錢
                sharedData.realizedProfit -= (tx.profit || 0); // 扣回當初記錄的已實現獲利
            }

            // 從總紀錄清單中移除
            sharedData.transactions.splice(txIndex, 1);
        });

        // 移除庫存本身
        sharedData.holdings = sharedData.holdings.filter(h => h.id !== holding.id);

        closeEditHoldingModal();
        showToast('資產及相關明細已徹底刪除');
        updateAndSave();
    };


    window.submitCashTx = function() {
        const type = document.querySelector('input[name="cashType"]:checked').value;
        const date = document.getElementById('cashDate').value;
        const amount = parseFloat(document.getElementById('cashAmount').value);
        const note = document.getElementById('cashNote').value.trim() || (type === 'deposit' ? '存入本金' : type === 'withdraw' ? '提領本金' : '股息/利息');

        if (!date || isNaN(amount) || amount <= 0) {
            showToast('請輸入有效金額與日期');
            return;
        }

        if (type === 'deposit') {
            sharedData.realCapital += amount;
            sharedData.cashPool += amount;
        } else if (type === 'withdraw') {
            sharedData.realCapital -= amount; 
            sharedData.cashPool -= amount;
        } else if (type === 'dividend') {
            sharedData.cashPool += amount;
            sharedData.realizedProfit += amount;
        }

        sharedData.transactions.push({
            id: Date.now().toString(),
            date, type, category: 'cash', name: note, amount, user: currentUser
        });

        updateAndSave();
    };

    window.submitAssetTx = function(category) {
        const type = document.querySelector('input[name="assetType"]:checked').value;
        const date = document.getElementById('assetDate').value;
        const code = document.getElementById('assetCode').value.trim();
        const name = document.getElementById('assetName').value.trim();
        const qty = parseFloat(document.getElementById('assetQty').value);
        const price = parseFloat(document.getElementById('assetPrice').value);
        const fee = parseFloat(document.getElementById('assetFee').value) || 0;

        // 代號為非必填(可能適用於儲蓄或基金)，但有填就會優先比對代號
        if (!date || !name || isNaN(qty) || qty <= 0 || isNaN(price) || price < 0) {
            showToast('請填寫完整資訊 (名稱、數量、單價)');
            return;
        }

        // 智慧尋找庫存：如果這次表單有填寫代號，就優先用代號比對；沒有代號的話，就用名稱比對。
        let holdingIndex = sharedData.holdings.findIndex(h => {
            if (h.category !== category) return false;
            if (code && h.code) return h.code === code; 
            return h.name === name;
        });
        
        let txAmount = 0;
        let realizedProfitForThisTx = 0;

        if (type === 'buy') {
            txAmount = (qty * price) + fee;
            sharedData.cashPool -= txAmount;

            if (holdingIndex >= 0) {
                sharedData.holdings[holdingIndex].quantity += qty;
                sharedData.holdings[holdingIndex].totalCost += txAmount;
                sharedData.holdings[holdingIndex].currentPrice = 0;
                // 若庫存原本沒有代號，這次買入補上代號了，則更新代號
                if (code && !sharedData.holdings[holdingIndex].code) {
                    sharedData.holdings[holdingIndex].code = code;
                }
            } else {
                sharedData.holdings.push({
                    id: Date.now().toString(), category, code, name, quantity: qty, totalCost: txAmount, currentPrice: 0
                });
            }
        } else if (type === 'sell') {
            if (holdingIndex < 0 || sharedData.holdings[holdingIndex].quantity < qty) {
                showToast('賣出數量超過目前庫存！');
                return;
            }

            txAmount = (qty * price) - fee;
            sharedData.cashPool += txAmount;

            const holding = sharedData.holdings[holdingIndex];
            const avgCost = holding.totalCost / holding.quantity;
            const costOfSold = avgCost * qty;
            
            realizedProfitForThisTx = txAmount - costOfSold;
            sharedData.realizedProfit += realizedProfitForThisTx;

            holding.quantity -= qty;
            holding.totalCost -= costOfSold;

            if (holding.quantity <= 0.000001) { 
                sharedData.holdings.splice(holdingIndex, 1);
            }
        }

        sharedData.transactions.push({
            id: Date.now().toString(),
            date, type, category, code, name, qty, price, fee, amount: txAmount, profit: realizedProfitForThisTx, user: currentUser
        });

        isFormOpen = false;
        updateAndSave();
    };

    // 單筆刪除紀錄，並智慧復原該筆紀錄所產生的財務影響
    window.deleteTx = function(id) {
        if (!confirm('確定要刪除這筆交易紀錄嗎？\n系統會自動扣除或還原當時影響的資金與庫存。')) return;

        const txIndex = sharedData.transactions.findIndex(t => t.id === id);
        if (txIndex === -1) return;
        
        const tx = sharedData.transactions[txIndex];

        if (tx.category === 'cash') {
            if (tx.type === 'deposit') {
                sharedData.realCapital -= tx.amount;
                sharedData.cashPool -= tx.amount;
            } else if (tx.type === 'withdraw') {
                sharedData.realCapital += tx.amount;
                sharedData.cashPool += tx.amount;
            } else if (tx.type === 'dividend') {
                sharedData.cashPool -= tx.amount;
                sharedData.realizedProfit -= tx.amount;
            }
        } else {
            // 資產交易復原 (同樣以代號優先，名稱次之來尋找庫存)
            let holding = sharedData.holdings.find(h => {
                if (h.category !== tx.category) return false;
                if (tx.code && h.code) return h.code === tx.code;
                return h.name === tx.name;
            });
            
            // 【防呆】檢查刪除這筆交易後，歷史紀錄中是否還留有該資產的其他交易明細
            const remainingAssetTxs = sharedData.transactions.filter(t => 
                t.id !== id && 
                t.category === tx.category && 
                ((tx.code && t.code === tx.code) || (!tx.code && t.name === tx.name))
            );
            
            if (tx.type === 'buy') {
                sharedData.cashPool += tx.amount; // 退回當初買入扣掉的錢
                if (holding) {
                    holding.quantity -= tx.qty;
                    holding.totalCost -= tx.amount;
                    
                    // 放寬浮點數判斷門檻，並結合「若無剩餘交易則強制清除」的邏輯
                    if (holding.quantity <= 0.0001 || remainingAssetTxs.length === 0) {
                        sharedData.holdings = sharedData.holdings.filter(h => h.id !== holding.id);
                    }
                }
            } else if (tx.type === 'sell') {
                sharedData.cashPool -= tx.amount; // 扣除當初賣出賺到的現金
                sharedData.realizedProfit -= (tx.profit || 0); // 扣除當初的獲利
                
                const costOfSold = tx.amount - (tx.profit || 0); // 算出當初扣除的成本
                
                if (holding) {
                    holding.quantity += tx.qty;
                    holding.totalCost += costOfSold;
                } else {
                    // 如果當初賣光光了，現在刪除賣單，就要把庫存無中生有補回來
                    sharedData.holdings.push({
                        id: Date.now().toString(),
                        category: tx.category,
                        code: tx.code || '',
                        name: tx.name,
                        quantity: tx.qty,
                        totalCost: costOfSold,
                        currentPrice: 0
                    });
                }
            }
        }

        // 從紀錄清單中移除
        sharedData.transactions.splice(txIndex, 1);
        
        showToast('交易紀錄已刪除並復原狀態');
        updateAndSave();
    };

    window.toggleGroup = function(key) {
        collapsedGroups[key] = !collapsedGroups[key];
        saveLocalData(); 
        renderAll(); 
    };

    // --- 匯出功能 ---
    window.openExportModal = function() {
        if (sharedData.transactions.length === 0) {
            showToast('目前沒有交易資料可匯出');
            return;
        }
        
        const today = new Date();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
        
        const formatDate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };
        
        document.getElementById('exportStartDate').value = formatDate(firstDay);
        document.getElementById('exportEndDate').value = formatDate(today);
        
        document.getElementById('exportModal').classList.remove('hidden');
    };

    window.closeExportModal = function() {
        document.getElementById('exportModal').classList.add('hidden');
    };

    window.confirmExportCSV = function() {
        const start = document.getElementById('exportStartDate').value;
        const end = document.getElementById('exportEndDate').value;

        if (!start || !end) {
            showToast('請選擇起始與結束日期');
            return;
        }

        const filteredTxs = sharedData.transactions.filter(t => t.date >= start && t.date <= end);

        if (filteredTxs.length === 0) {
            showToast('所選區間沒有交易資料，請重新選擇');
            return;
        }

        const headers = ['日期', '大類', '操作', '項目/備註', '數量', '單價', '手續費', '總金額(進出)', '實現獲利', '填寫人'];
        let csvContent = '\uFEFF' + headers.join(',') + '\n'; 

        const rows = filteredTxs.map(t => {
            const typeStr = { 'buy':'買入', 'sell':'賣出', 'deposit':'存入本金', 'withdraw':'提領本金', 'dividend':'股息/利息' }[t.type] || t.type;
            const itemName = t.code ? `[${t.code}] ${t.name}` : t.name;
            return [
                t.date,
                t.category === 'cash' ? '現金流水' : t.category,
                typeStr,
                `"${itemName}"`, 
                t.qty || '',
                t.price || '',
                t.fee || 0,
                t.amount,
                t.profit || 0,
                t.user
            ].join(',');
        });

        csvContent += rows.join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `資產交易紀錄_${start}_至_${end}.csv`;
        link.click();
        
        closeExportModal(); 
    };

    // 執行初始化
    initFirebase();

</script>
</body>
</html>
