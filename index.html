<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全資產交易紀錄器 (修正版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
    </style>
</head>
<body class="p-6 bg-gray-50">
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-50">載入中...</div>
    
    <div id="app" class="max-w-7xl mx-auto space-y-6 hidden">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="card p-4 bg-white shadow rounded-lg">本金: <span id="stat-principal" class="font-bold">$0</span></div>
            <div class="card p-4 bg-white shadow rounded-lg">現金: <span id="stat-cash" class="font-bold">$0</span></div>
            <div class="card p-4 bg-white shadow rounded-lg flex justify-between">獲利: <span id="stat-profit" class="font-bold">$0</span> 
                <button id="btn-reinvest" onclick="handleReinvest()" class="hidden text-xs bg-green-100 px-2 py-1 rounded">轉本金</button>
            </div>
            <div class="card p-4 bg-white shadow rounded-lg">報酬: <span id="stat-roi" class="font-bold">0%</span></div>
        </div>

        <div class="flex space-x-2 border-b">
            <div class="tab-btn active px-4 py-2 cursor-pointer" onclick="showTab('stock', event)">股票</div>
            <div class="tab-btn px-4 py-2 cursor-pointer" onclick="showTab('crypto', event)">加密貨幣</div>
            <div class="tab-btn px-4 py-2 cursor-pointer" onclick="showTab('fund', event)">基金</div>
        </div>

        <div class="card p-6 bg-white shadow rounded-lg">
            <form id="tx-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <input type="hidden" id="input-category" value="stock">
                <input type="text" id="input-ticker" placeholder="資產名稱" class="border p-2 rounded">
                <input type="number" id="input-amount" placeholder="金額" class="border p-2 rounded">
                <input type="date" id="input-date" class="border p-2 rounded">
                <button type="submit" class="bg-blue-600 text-white p-2 rounded">新增紀錄</button>
            </form>
            <table class="w-full text-left">
                <thead><tr class="bg-gray-50"><th class="p-3">日期</th><th class="p-3">項目</th><th class="p-3">金額</th><th class="p-3">操作</th></tr></thead>
                <tbody id="tx-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 改名為 config 以符合瀏覽器快取中的預期變數
        const firebaseConfig = {
    apiKey: "AIzaSyA7p0zjKK2FkrAUquvME7z9RDNPIXMB1dY",
    authDomain: "new-mystoc.firebaseapp.com",
    projectId: "new-mystoc",
    storageBucket: "new-mystoc.firebasestorage.app",
    messagingSenderId: "562255915934",
    appId: "1:562255915934:web:b43f6db8554dcb325ac48f"};

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showTab(cat, event) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('input-category').value = cat;
            render(window.allTxs);
        }

        auth.signInAnonymously().then(() => {
            db.collection('shared_transactions').onSnapshot(snap => {
                window.allTxs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(window.allTxs);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            });
        });

        function render(txs) {
            const cat = document.getElementById('input-category').value;
            const filtered = txs ? txs.filter(t => t.category === cat) : [];
            const tbody = document.getElementById('tx-tbody');
            tbody.innerHTML = '';
            let p = 0, profit = 0;
            
            if (txs) {
                txs.forEach(t => {
                    if(t.type === 'reinvest') p += t.amount;
                    else if(t.category === 'cash') p += t.amount;
                    else profit += t.amount;
                });
            }

            filtered.forEach(t => {
                tbody.innerHTML += `<tr><td class="p-3">${t.date}</td><td class="p-3">${t.ticker}</td><td class="p-3">${t.amount}</td><td class="p-3"><button onclick="db.collection('shared_transactions').doc('${t.id}').delete()" class="text-red-500">刪除</button></td></tr>`;
            });

            document.getElementById('stat-principal').innerText = '$' + p;
            document.getElementById('stat-profit').innerText = '$' + profit;
            if(profit > 0) document.getElementById('btn-reinvest').classList.remove('hidden');
        }

        document.getElementById('tx-form').onsubmit = (e) => {
            e.preventDefault();
            db.collection('shared_transactions').add({
                date: document.getElementById('input-date').value || new Date().toISOString().split('T')[0],
                category: document.getElementById('input-category').value,
                ticker: document.getElementById('input-ticker').value,
                amount: parseFloat(document.getElementById('input-amount').value),
                type: 'buy',
                createdAt: Date.now()
            });
        };
    </script>
</body>
</html>
